<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-M8f+fD6ZgBplT0W7B8tWvO8q+z2z4h8X8A0y4T1q6P0gCpA8bqK0lpH8u86Mzz1k"
      crossorigin="anonymous"
    />
    <link href="main.css" rel="stylesheet" />
    <title>English Vocabulary Revision</title>
  </head>
  <body class="bg-light">
    <main class="container py-5">
      <div class="row justify-content-center">
        <div class="col-12 col-xl-8">
          <div class="card shadow-sm">
            <div class="card-body p-4">
              <header class="text-center mb-4">
                <h1 class="h2 mb-2">English Vocabulary Revision</h1>
                <p class="text-muted mb-0">
                  Upload your word list, choose a voice, and click any word to
                  hear pronunciation.
                </p>
              </header>

              <section class="mb-4">
                <form id="myForm" class="row g-3 align-items-end">
                  <div class="col-sm-8">
                    <label class="form-label mb-1" for="csvFile">
                      Vocabulary CSV</label>
                    <input class="form-control" type="file" id="csvFile" />
                  </div>
                  <div class="col-sm-4 d-grid">
                    <button type="submit" class="btn btn-primary">
                      Load words
                    </button>
                  </div>
                </form>

                <div class="row g-3 align-items-end mt-2">
                  <div class="col-sm-4">
                    <label class="form-label mb-1" for="numberOfVocabFrom">
                      From</label>
                    <input
                      class="form-control"
                      min="0"
                      type="number"
                      name="numberOfVocabFrom"
                      id="numberOfVocabFrom"
                    />
                  </div>
                  <div class="col-sm-4">
                    <label class="form-label mb-1" for="numberOfVocabTo">To</label>
                    <input
                      class="form-control"
                      min="1"
                      type="number"
                      id="numberOfVocabTo"
                      name="numberOfVocabTo"
                    />
                  </div>
                  <div class="col-sm-4 d-grid">
                    <button id="changeWords" type="button" class="btn btn-outline-secondary">
                      Update range
                    </button>
                  </div>
                </div>
                  <div class="col-sm-4 d-grid">
                    <button id="playBtn" type="button" class="btn btn-dark">
                      Play all
                    </button>
                  </div>
                </div>
              </section>

              <div id="info" class="alert alert-info text-center">
                No words loaded yet.
              </div>

              <section class="word-panel">
                <ol id="container" class="list-group"></ol>
              </section>

              <div class="d-flex justify-content-end mt-3">
                <button class="nextPage btn btn-primary" type="button">
                  Next Page
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script src="main.js"></script>
  </body>
</html>
